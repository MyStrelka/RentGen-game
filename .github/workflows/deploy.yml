name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Generate Firebase config file
        run: |
          echo "🔐 Generate firebase-config.js with secrets"
          if [ -z "${{ secrets.FIREBASE_API_KEY }}" ] || [ -z "${{ secrets.FIREBASE_AUTH_DOMAIN }}" ] || [ -z "${{ secrets.FIREBASE_DATABASE_URL }}" ] || [ -z "${{ secrets.FIREBASE_PROJECT_ID }}" ] || [ -z "${{ secrets.FIREBASE_STORAGE_BUCKET }}" ] || [ -z "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" ] || [ -z "${{ secrets.FIREBASE_APP_ID }}" ]; then
            echo "❌ One or more Firebase secrets are missing"
            exit 1
          fi
          cat > firebase-config.js << 'EOF'
window.firebaseConfig = {
  apiKey: "${{ secrets.FIREBASE_API_KEY }}",
  authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
  databaseURL: "${{ secrets.FIREBASE_DATABASE_URL }}",
  projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
  storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
  messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
  appId: "${{ secrets.FIREBASE_APP_ID }}"
};
EOF
          echo "✅ Created firebase-config.js"
          echo "🔍 Debug output (first lines):"
          head -n 20 firebase-config.js
          echo "🔍 Verify placeholders are not in firebase-config.js"
          if grep -E "__FIREBASE_(API_KEY|AUTH_DOMAIN|DATABASE_URL|PROJECT_ID|STORAGE_BUCKET|MESSAGING_SENDER_ID|APP_ID)__" firebase-config.js; then
            echo "❌ Placeholder value found in created firebase-config.js"
            exit 1
          fi
          echo "✅ firebase-config.js looks good"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
