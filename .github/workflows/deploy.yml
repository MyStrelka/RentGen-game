name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Inject Firebase secrets into index.html and script.js
        run: |
          echo "🔐 Inject firebase config into index.html and script.js"

          if [ -z "${{ secrets.FIREBASE_API_KEY }}" ]; then echo "❌ FIREBASE_API_KEY missing"; exit 1; fi
          if [ -z "${{ secrets.FIREBASE_AUTH_DOMAIN }}" ]; then echo "❌ FIREBASE_AUTH_DOMAIN missing"; exit 1; fi
          if [ -z "${{ secrets.FIREBASE_DATABASE_URL }}" ]; then echo "❌ FIREBASE_DATABASE_URL missing"; exit 1; fi
          if [ -z "${{ secrets.FIREBASE_PROJECT_ID }}" ]; then echo "❌ FIREBASE_PROJECT_ID missing"; exit 1; fi
          if [ -z "${{ secrets.FIREBASE_STORAGE_BUCKET }}" ]; then echo "❌ FIREBASE_STORAGE_BUCKET missing"; exit 1; fi
          if [ -z "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" ]; then echo "❌ FIREBASE_MESSAGING_SENDER_ID missing"; exit 1; fi
          if [ -z "${{ secrets.FIREBASE_APP_ID }}" ]; then echo "❌ FIREBASE_APP_ID missing"; exit 1; fi

          for file in index.html script.js; do
            sed -i "s|__FIREBASE_API_KEY__|${{ secrets.FIREBASE_API_KEY }}|g" "$file"
            sed -i "s|__FIREBASE_AUTH_DOMAIN__|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" "$file"
            sed -i "s|__FIREBASE_DATABASE_URL__|${{ secrets.FIREBASE_DATABASE_URL }}|g" "$file"
            sed -i "s|__FIREBASE_PROJECT_ID__|${{ secrets.FIREBASE_PROJECT_ID }}|g" "$file"
            sed -i "s|__FIREBASE_STORAGE_BUCKET__|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" "$file"
            sed -i "s|__FIREBASE_MESSAGING_SENDER_ID__|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g" "$file"
            sed -i "s|__FIREBASE_APP_ID__|${{ secrets.FIREBASE_APP_ID }}|g" "$file"
          done

          echo "🔍 Verify placeholders are removed from index.html and script.js"
          if grep -q "__FIREBASE_API_KEY__" index.html script.js; then
            echo "❌ Placeholder __FIREBASE_API_KEY__ remains"
            exit 1
          fi
          if grep -q "__FIREBASE_DATABASE_URL__" index.html script.js; then
            echo "❌ Placeholder __FIREBASE_DATABASE_URL__ remains"
            exit 1
          fi

          echo "✅ placeholders replaced"
          echo "🔍 index.html snippet after injection:"
          sed -n '1,40p' index.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
